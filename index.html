<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RF Link Budget — FPV Calculator</title>
<style>
  :root{
    --bg:#0b0f10; --panel:#12181a; --panel2:#0e1416; --line:#1f2a2d;
    --txt:#dfe9e6; --muted:#7d908b; --dim:#566460;
    --green:#3ddb9a; --green-d:#1f7a57; --amber:#f5b945; --red:#f06a5a;
    --blue:#5aa9e6; --purple:#c98bdb;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);
    background-image:radial-gradient(circle at 50% 0%,#10181a 0%,#0b0f10 60%);min-height:100vh;}
  .head{padding:18px 26px 12px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .head h1{margin:0;font-size:18px;font-weight:600;letter-spacing:.3px;}
  .head h1 .dot{color:var(--green);}
  .head p{margin:4px 0 0;color:var(--muted);font-size:12px;max-width:640px;}
  .langsw{display:flex;gap:4px;flex-shrink:0;}
  .langsw button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    font-family:var(--mono);font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;font-weight:600;}
  .langsw button.on{background:var(--green-d);border-color:var(--green);color:#eafff6;}
  .grid{display:grid;grid-template-columns:minmax(0,350px) minmax(0,1fr);gap:0;}
  @media(max-width:860px){.grid{grid-template-columns:1fr;}}
  .controls{padding:20px 24px;border-right:1px solid var(--line);}
  .results{padding:20px 24px;}
  .sec{margin-bottom:18px;}
  .sec-t{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--green);
    margin:0 0 10px;font-weight:600;}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;}
  .row{margin-bottom:13px;}
  input[type=number],select{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);font-family:var(--mono);font-size:14px;padding:7px 10px;border-radius:7px;outline:none;}
  input[type=number]:focus{border-color:var(--green-d);}
  input[type=range]{width:100%;accent-color:var(--green);margin-top:4px;}
  .freq-val{font-family:var(--mono);font-size:15px;color:var(--green);float:right;}
  .seg{display:flex;gap:5px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:58px;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);font-family:var(--mono);font-size:12px;padding:7px 4px;border-radius:7px;
    cursor:pointer;transition:.12s;}
  .seg button:hover{border-color:var(--green-d);color:var(--txt);}
  .seg button.on{background:var(--green-d);border-color:var(--green);color:#eafff6;}
  .preset{display:flex;gap:5px;margin-top:6px;}
  .preset button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    font-family:var(--mono);font-size:11px;padding:5px;border-radius:6px;cursor:pointer;}
  .preset button:hover{border-color:var(--green-d);color:var(--txt);}
  .disabled{opacity:.35;pointer-events:none;}
  details{margin-top:6px;}
  summary{font-size:11.5px;color:var(--dim);cursor:pointer;padding:4px 0;}
  .hero{background:linear-gradient(160deg,#10211c,#0e1618);border:1px solid var(--green-d);
    border-radius:14px;padding:16px 20px;margin-bottom:14px;}
  .hero .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--green);}
  .hero .big{font-family:var(--mono);font-size:38px;font-weight:600;color:#eafff6;line-height:1.1;margin:6px 0 2px;}
  .hero .big span{font-size:18px;color:var(--muted);}
  .hero .ctx{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .fbox{border-top:1px dashed var(--line);padding-top:10px;margin-top:4px;}
  .f-toggle{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--green);
    cursor:pointer;padding:3px 0;font-weight:600;list-style:none;user-select:none;}
  .f-toggle::-webkit-details-marker{display:none;}
  .f-toggle::before{content:"▸ ";color:var(--green);}
  details[open] .f-toggle::before{content:"▾ ";}
  details[open] .f-toggle{margin-bottom:8px;}
  .fblk{margin-bottom:12px;}
  .fblk:last-child{margin-bottom:0;}
  .f-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;}
  .f-line{font-family:var(--mono);font-size:12.5px;line-height:1.85;color:var(--txt);
    overflow-x:auto;white-space:nowrap;padding-bottom:2px;}
  .f-sym{color:var(--dim);font-size:12px;}
  .v-lna{color:var(--blue);} .v-gain{color:var(--green);} .v-cable{color:var(--amber);}
  .v-rx{color:var(--purple);} .v-sig{color:var(--red);} .v-res{color:#eafff6;font-weight:600;}
  .tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .tier{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px;}
  .tier .t-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .tier .t-v{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px;}
  .tier.clean .t-v{color:var(--green);} .tier.use .t-v{color:var(--amber);} .tier.edge .t-v{color:var(--red);}
  .tier .t-u{font-size:10.5px;color:var(--dim);}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 12px;
    display:flex;justify-content:space-between;align-items:baseline;}
  .stat .s-l{font-size:11.5px;color:var(--muted);}
  .stat .s-v{font-family:var(--mono);font-size:14px;color:var(--txt);}
  .chart-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 12px 8px;}
  .chart-t{font-size:11px;color:var(--muted);margin:0 0 8px;padding-left:4px;}
  canvas{width:100%;display:block;}
  .bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:760px){.bottom-row{grid-template-columns:1fr;}}
  .cov-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .cov-presets{display:flex;gap:5px;flex-wrap:wrap;}
  .cov-presets button{flex:1;min-width:78px;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 4px;border-radius:6px;cursor:pointer;transition:.12s;}
  .cov-presets button:hover{border-color:var(--green-d);color:var(--txt);}
  .cov-presets button.on{background:var(--green-d);border-color:var(--green);color:#eafff6;}
  .cov-result{background:linear-gradient(160deg,#10211c,#0e1618);border:1px solid var(--green-d);
    border-radius:10px;padding:11px 14px;margin:12px 0 8px;}
  .cov-r-l{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--green);}
  .cov-r-v{font-family:var(--mono);font-size:26px;font-weight:600;color:#eafff6;margin-top:3px;}
  .cov-r-v span:last-child{font-size:14px;color:var(--muted);}
  .cov-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px;}
  .cov-body{display:flex;gap:12px;align-items:flex-start;}
  .cov-main{flex:1;min-width:0;}
  .cov-svg{width:184px;flex-shrink:0;height:auto;margin-top:-38px;}
  .cov-note{margin-top:8px;display:block;}
  .flag{border-radius:8px;padding:9px 13px;font-size:12.5px;margin-bottom:12px;display:none;}
  .flag.show{display:block;}
  .flag.warn{background:#2a1f08;border:1px solid #5a4410;color:var(--amber);}
  .flag.info{background:#0e1f2a;border:1px solid #1b4055;color:var(--blue);}
  .rx-tag{font-family:var(--mono);font-size:12px;color:var(--green);}
  .foot{padding:14px 26px 30px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);line-height:1.6;}
  .foot b{color:var(--muted);}
</style>
</head>
<body>
<div class="head">
  <div>
    <h1><span class="dot">◢</span> <span data-i="title"></span></h1>
    <p data-i="subtitle"></p>
  </div>
  <div class="langsw">
    <button data-lang="uk" class="on">UK</button>
    <button data-lang="en">EN</button>
  </div>
</div>

<div class="grid">
  <div class="controls">
    <div class="sec">
      <p class="sec-t" data-i="sec_signal"></p>
      <div class="row">
        <label><span data-i="lbl_freq"></span> <span class="freq-val" id="freqVal">5800</span></label>
        <input type="range" id="freq" min="1000" max="8200" step="50" value="5800">
      </div>
      <div class="row">
        <label data-i="lbl_power"></label>
        <input type="number" id="pw" value="3" step="0.5" min="0.01">
        <div class="preset">
          <button data-pw="1">1</button><button data-pw="3">3</button>
          <button data-pw="5">5</button><button data-pw="10">10</button>
        </div>
      </div>
      <div class="row">
        <label data-i="lbl_gant"></label>
        <input type="number" id="gant" value="17" step="0.5">
        <div class="preset">
          <button data-g="2" data-i="preset_omni"></button><button data-g="10">10 (1.2)</button>
          <button data-g="14">14 (3.3)</button><button data-g="17">17 (5.8)</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <p class="sec-t" data-i="sec_cable"></p>
      <div class="row">
        <div class="seg" id="cableSeg">
          <button data-c="none" class="on" data-i="btn_nocable"></button>
          <button data-c="rg58">RG-58U</button>
          <button data-c="sll240">SLL-240-SF</button>
          <button data-c="sll300">SLL-300</button>
        </div>
      </div>
      <div class="row disabled" id="lenRow">
        <label data-i="lbl_len"></label>
        <input type="number" id="len" value="14" step="1" min="0">
      </div>
    </div>

    <div class="sec">
      <p class="sec-t" data-i="sec_lna"></p>
      <div class="seg" id="lnaSeg">
        <button data-l="none" class="on" data-i="btn_nolna"></button>
        <button data-l="ZK06-UM">ZK06-UM</button>
        <button data-l="ZK09-UM">ZK09-UM</button>
      </div>
    </div>

    <details>
      <summary data-i="sec_advanced"></summary>
      <div class="row" style="margin-top:10px;"><label><span data-i="lbl_sens"></span> <span class="freq-val" id="sensVal">−83.5</span></label>
        <input type="range" id="sens" min="-110" max="-60" step="0.5" value="-83.5"></div>
      <div class="row"><label data-i="lbl_nfrx"></label><input type="number" id="nfrx" value="8" step="0.5"></div>
      <div class="row"><label data-i="lbl_txant"></label><input type="number" id="txant" value="2" step="0.5"></div>
      <div class="row"><label data-i="lbl_bw"></label><input type="number" id="bw" value="18" step="1"></div>
      <div class="row"><label data-i="lbl_snrth"></label><input type="number" id="snrth" value="10" step="1"></div>
    </details>
  </div>

  <div class="results">
    <div class="flag warn" id="flagWarn"></div>
    <div class="flag info" id="flagInfo"></div>

    <div class="hero">
      <div class="lbl"><span data-i="hero_lbl"></span></div>
      <div class="big"><span id="rangeMain">—</span> <span data-i="unit_km"></span></div>
      <div class="ctx" id="heroCtx"></div>
      <details class="fbox">
        <summary class="f-toggle" data-i="formulas_toggle"></summary>
        <div class="fblk">
          <div class="f-h" id="fNfH"></div>
          <div class="f-line" id="fNfSym"></div>
          <div class="f-line" id="fNfNum"></div>
        </div>
        <div class="fblk">
          <div class="f-h" id="fRngH"></div>
          <div class="f-line" id="fRng1"></div>
          <div class="f-line" id="fRng2"></div>
          <div class="f-line" id="fRng3"></div>
        </div>
      </details>
    </div>

    <div class="tiers">
      <div class="tier clean"><div class="t-l" data-i="tier_clean"></div><div class="t-v" id="rClean">—</div><div class="t-u">SNR ≥ 15 dB</div></div>
      <div class="tier use"><div class="t-l" data-i="tier_use"></div><div class="t-v" id="rUse">—</div><div class="t-u">SNR ≥ 10 dB</div></div>
      <div class="tier edge"><div class="t-l" data-i="tier_edge"></div><div class="t-v" id="rEdge">—</div><div class="t-u">SNR ≥ 6 dB</div></div>
    </div>

    <div class="stats">
      <div class="stat"><span class="s-l" data-i="stat_nf"></span><span class="s-v" id="sNf">—</span></div>
      <div class="stat"><span class="s-l" data-i="stat_cable"></span><span class="s-v" id="sCable">—</span></div>
      <div class="stat"><span class="s-l" data-i="stat_lna"></span><span class="s-v" id="sLna">—</span></div>
      <div class="stat"><span class="s-l" data-i="stat_net"></span><span class="s-v" id="sNet">—</span></div>
      <div class="stat"><span class="s-l" data-i="stat_floor"></span><span class="s-v" id="sFloor">—</span></div>
      <div class="stat"><span class="s-l" data-i="stat_rx"></span><span class="s-v rx-tag" id="sRx">—</span></div>
    </div>

    <div class="bottom-row">
      <div class="chart-wrap">
        <p class="chart-t" data-i="chart_t"></p>
        <canvas id="chart" height="240"></canvas>
      </div>
      <div class="cov-wrap">
        <p class="chart-t" data-i="cov_title"></p>
        <div class="cov-body">
          <div class="cov-main">
            <div class="cov-presets" id="covPresets">
              <button data-a="40">10 dBi · 40°</button>
              <button data-a="36">14 dBi · 36°</button>
              <button data-a="16" class="on">17 dBi · 16°</button>
            </div>
            <div class="row" style="margin-top:10px;">
              <label data-i="cov_angle"></label>
              <input type="number" id="covAngle" value="16" step="1" min="1" max="179">
            </div>
            <div class="row">
              <label data-i="cov_dist"></label>
              <input type="number" id="covDist" value="10" step="1" min="0">
            </div>
            <div class="cov-result">
              <div class="cov-r-l" data-i="cov_width"></div>
              <div class="cov-r-v"><span id="covWidth">—</span> <span data-i="unit_km"></span></div>
              <div class="cov-sub" id="covSub"></div>
            </div>
            <div class="cov-note f-sym" data-i="cov_note"></div>
          </div>
          <svg id="covSvg" viewBox="0 0 80 140" class="cov-svg"></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="foot" data-i="foot"></div>

    warn_nf:(nf,rx)=>`⚠ System NF (${nf} dB) approaches receiver NF (${rx} dB) — the LNA barely helps. Cable too long.`,
    info_add:"💡 For weak distant signals add an LNA — it boosts range by 2–3×.",
    info_rec:(f,r)=>`💡 For ${f} MHz the matching LNA is ${r}.`,
  }
};
let lang='uk';

function cableDbPerM(type,f){
  if(type==='rg58')return(0.778*Math.sqrt(f)+0.003997*f)/100;
  if(type==='sll240')return(0.7762*Math.sqrt(f)+0.00196*f)/100;
  if(type==='sll300')return(0.6311*Math.sqrt(f)+0.001075*f)/100;
  return 0;
}
const CABLE_NAME={none:'—',rg58:'RG-58U',sll240:'SLL-240-SF',sll300:'SLL-300'};
const ZK06=[[1000,22.5,0.6],[2000,22.5,0.7],[3000,21,0.7],[4000,22,0.7],[5000,23,0.8],[6000,22.5,1.0]];
const ZK09=[[1000,21.5,2.0],[2000,21,2.1],[3000,21,2.3],[4000,20,2.4],[5000,18.5,2.5],
            [6000,17.5,2.7],[7000,16.5,2.8],[8000,15,3.1],[9000,14,3.5],[10000,13,3.9]];
const LNA_RANGE={'ZK06-UM':[0.01,6000],'ZK09-UM':[1000,10000]};
function interp(tab,f){
  if(f<=tab[0][0])return[tab[0][1],tab[0][2]];
  if(f>=tab[tab.length-1][0])return[tab[tab.length-1][1],tab[tab.length-1][2]];
  for(let i=0;i<tab.length-1;i++){if(f>=tab[i][0]&&f<=tab[i+1][0]){
    const t=(f-tab[i][0])/(tab[i+1][0]-tab[i][0]);
    return[tab[i][1]+t*(tab[i+1][1]-tab[i][1]),tab[i][2]+t*(tab[i+1][2]-tab[i][2])];}}
  return[tab[0][1],tab[0][2]];
}
function lnaParams(name,f){return interp(name==='ZK09-UM'?ZK09:ZK06,f);}
function rxForFreq(f){
  if(f>=1000&&f<=2000)return'TA8804F+TA1322FN';
  if(f>=2800&&f<=4200)return'RX3364';
  if(f>=4800&&f<=6000)return'RX5808';
  if(f>=6000&&f<=8200)return'SK7200';
  return T[lang].rx_out;
}
function nfSys(useLna,name,cableDb,nfRx,f){
  if(!useLna)return cableDb+nfRx;
  const[g,nf]=lnaParams(name,f);
  const F1=Math.pow(10,nf/10),G1=Math.pow(10,g/10),L=Math.pow(10,cableDb/10),F3=Math.pow(10,nfRx/10);
  return 10*Math.log10(F1+(L-1)/G1+L*(F3-1)/G1);
}
function rangeKm(pw,gRx,txAnt,nf,f,snr,bw){
  const eirp=10*Math.log10(pw*1000)+txAnt;
  const ktb=-174+10*Math.log10(bw*1e6);
  const fsplMax=eirp+gRx-(ktb+nf+snr);
  return Math.pow(10,(fsplMax-32.45-20*Math.log10(f))/20);
}
function fmtKm(v){if(!isFinite(v)||v<=0)return'—';return v>=100?v.toFixed(0):v.toFixed(1);}

const st={cable:'none',lna:'none'};
const $=id=>document.getElementById(id);

function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i');const v=T[lang][k];
    if(typeof v==='string'){if(k==='foot')el.innerHTML=v;else el.textContent=v;}
  });
  document.querySelectorAll('.langsw button').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  calc();
  covCalc();
}
document.querySelectorAll('.langsw button').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;applyLang();});
document.querySelectorAll('#cableSeg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#cableSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');st.cable=b.dataset.c;
  $('lenRow').classList.toggle('disabled',st.cable==='none');calc();});
document.querySelectorAll('#lnaSeg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#lnaSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');st.lna=b.dataset.l;calc();});
document.querySelectorAll('.preset button[data-pw]').forEach(b=>b.onclick=()=>{$('pw').value=b.dataset.pw;calc();});
document.querySelectorAll('.preset button[data-g]').forEach(b=>b.onclick=()=>{$('gant').value=b.dataset.g;calc();});
// sensitivity <-> NF sync (sensitivity = kTB + NF + SNR threshold)
function ktbNow(){return -174+10*Math.log10((+$('bw').value)*1e6);}
function senseFromNf(){return ktbNow()+(+$('nfrx').value)+(+$('snrth').value);}
function nfFromSense(){return (+$('sens').value)-ktbNow()-(+$('snrth').value);}
function updSensDisplay(){$('sensVal').textContent=(+$('sens').value).toFixed(1);}

['freq','pw','gant','len','txant'].forEach(id=>$(id).addEventListener('input',calc));
$('sens').addEventListener('input',()=>{$('nfrx').value=nfFromSense().toFixed(1);updSensDisplay();calc();});
$('nfrx').addEventListener('input',()=>{$('sens').value=senseFromNf().toFixed(1);updSensDisplay();calc();});
['bw','snrth'].forEach(id=>$(id).addEventListener('input',()=>{$('sens').value=senseFromNf().toFixed(1);updSensDisplay();calc();}));

const S=(cls,val)=>`<span class="${cls}">${val}</span>`;

function calc(){
  const L=T[lang];
  const f=+$('freq').value,pw=+$('pw').value,gRx=+$('gant').value;
  const len=+$('len').value,nfRx=+$('nfrx').value,txAnt=+$('txant').value;
  const bw=+$('bw').value,snrTh=+$('snrth').value;
  $('freqVal').textContent=f;
  const useLna=st.lna!=='none';
  const useCable=st.cable!=='none'&&len>0;
  const cableDb=useCable?cableDbPerM(st.cable,f)*len:0;
  const nf=nfSys(useLna,st.lna,cableDb,nfRx,f);

  $('rangeMain').textContent=fmtKm(rangeKm(pw,gRx,txAnt,nf,f,snrTh,bw));
  $('rClean').textContent=fmtKm(rangeKm(pw,gRx,txAnt,nf,f,15,bw));
  $('rUse').textContent=fmtKm(rangeKm(pw,gRx,txAnt,nf,f,10,bw));
  $('rEdge').textContent=fmtKm(rangeKm(pw,gRx,txAnt,nf,f,6,bw));

  $('sNf').textContent=nf.toFixed(2)+' dB';
  $('sCable').textContent=useCable?cableDb.toFixed(1)+' dB':'—';
  let netGain,gLna=0;
  if(useLna){[gLna]=lnaParams(st.lna,f);$('sLna').textContent=gLna.toFixed(1)+' dB';netGain=gLna-cableDb;}
  else{$('sLna').textContent='—';netGain=-cableDb;}
  $('sNet').textContent=(netGain>=0?'+':'')+netGain.toFixed(1)+' dB';
  const ktb=-174+10*Math.log10(bw*1e6);
  $('sFloor').textContent=(ktb+nf).toFixed(1)+' dBm';
  $('sRx').textContent=rxForFreq(f);
  $('heroCtx').textContent=`${pw} ${L.w} · ${L.ctx_ant} ${gRx} dBi · ${useLna?st.lna:L.nolna} · ${useCable?CABLE_NAME[st.cable]+' '+len+' '+L.m:L.nocable}`;

  renderFormulas(L,useLna,cableDb,nf,nfRx,f,gLna,pw,gRx,txAnt,snrTh,ktb);

  const fw=$('flagWarn'),fi=$('flagInfo');
  fw.classList.remove('show');fi.classList.remove('show');
  if(useLna){
    const[lo,hi]=LNA_RANGE[st.lna];
    if(f<lo||f>hi){fw.innerHTML=L.warn_range(st.lna,lo<1000?lo:(lo/1000),hi/1000,f);fw.classList.add('show');}
    else if(netGain<0){fw.innerHTML=L.warn_net(cableDb.toFixed(1));fw.classList.add('show');}
    else if(nf>=nfRx-0.3){fw.innerHTML=L.warn_nf(nf.toFixed(1),nfRx);fw.classList.add('show');}
  }
  if(!useLna){fi.innerHTML=L.info_add;fi.classList.add('show');}
  else{const rec=f<=6000?'ZK06-UM':'ZK09-UM';if(st.lna!==rec){fi.innerHTML=L.info_rec(f,rec);fi.classList.add('show');}}

  drawChart(pw,gRx,txAnt,nfRx,bw,len,useLna,useCable,f);
}

function renderFormulas(L,useLna,cableDb,nf,nfRx,f,gLna,pw,gRx,txAnt,snrTh,ktb){
  if(useLna){
    $('fNfH').textContent=L.f_nf_h;
    const F1=Math.pow(10,lnaParams(st.lna,f)[1]/10);
    const G1=Math.pow(10,gLna/10);
    const Ll=Math.pow(10,cableDb/10);
    const F3=Math.pow(10,nfRx/10);
    const Flin=F1+(Ll-1)/G1+Ll*(F3-1)/G1;
    $('fNfSym').innerHTML=`F<sub>sys</sub> = ${S('v-lna','F<sub>LNA</sub>')} + (${S('v-cable','L')}−1)/${S('v-gain','G')} + ${S('v-cable','L')}·(${S('v-rx','F<sub>RX</sub>')}−1)/${S('v-gain','G')}`;
    $('fNfNum').innerHTML=`= ${S('v-lna',F1.toFixed(2))} + (${S('v-cable',Ll.toFixed(1))}−1)/${S('v-gain',G1.toFixed(0))} + ${S('v-cable',Ll.toFixed(1))}·(${S('v-rx',F3.toFixed(2))}−1)/${S('v-gain',G1.toFixed(0))} = ${S('v-res',Flin.toFixed(2))} → ${S('v-res',nf.toFixed(2)+' dB')}`;
  } else {
    $('fNfH').textContent=L.f_nf_h_nolna;
    $('fNfSym').innerHTML=`NF<sub>sys</sub> = ${S('v-cable','L<sub>cable</sub>')} + ${S('v-rx','NF<sub>RX</sub>')}`;
    $('fNfNum').innerHTML=`= ${S('v-cable',cableDb.toFixed(1))} + ${S('v-rx',nfRx.toFixed(1))} = ${S('v-res',nf.toFixed(1)+' dB')}`;
  }
  $('fRngH').textContent=L.f_rng_h;
  const eirp=10*Math.log10(pw*1000)+txAnt;
  const mds=ktb+nf+snrTh;
  const fsplMax=eirp+gRx-mds;
  const d=Math.pow(10,(fsplMax-32.45-20*Math.log10(f))/20);
  $('fRng1').innerHTML=`EIRP = 10·log(${S('v-sig',pw)}·1000)+${S('v-sig',txAnt)} = ${S('v-sig',eirp.toFixed(1)+' dBm')}　|　MDS = kTB+NF+SNR = ${ktb.toFixed(1)}+${nf.toFixed(1)}+${snrTh} = ${S('v-res',mds.toFixed(1)+' dBm')}`;
  $('fRng2').innerHTML=`FSPL<sub>max</sub> = EIRP + ${S('v-gain','G<sub>RX</sub>')} − MDS = ${S('v-sig',eirp.toFixed(1))} + ${S('v-gain',gRx)} − (${mds.toFixed(1)}) = ${S('v-res',fsplMax.toFixed(1)+' dB')}`;
  $('fRng3').innerHTML=`<span class="f-sym">FSPL = 32.45 + 20·log(d) + 20·log(f) ⟹ </span>d = 10<sup>(${fsplMax.toFixed(1)}−32.45−20·log(${S('v-sig',f)}))/20</sup> = ${S('v-res',fmtKm(d)+' '+L.unit_km)}`;
}

const cv=$('chart'),cx=cv.getContext('2d');
function drawChart(pw,gRx,txAnt,nfRx,bw,len,useLna,useCable,curF){
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=240;
  cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);cx.clearRect(0,0,W,H);
  const padL=44,padR=12,padT=12,padB=26,x0=padL,x1=W-padR,y0=padT,y1=H-padB;
  const fMin=1000,fMax=8200;const pts=[];let rMax=0;
  for(let f=fMin;f<=fMax;f+=50){
    const cdb=useCable?cableDbPerM(st.cable,f)*len:0;
    const nf=nfSys(useLna,useLna?st.lna:'none',cdb,nfRx,f);
    const r=rangeKm(pw,gRx,txAnt,nf,f,10,bw);pts.push([f,r]);if(r>rMax)rMax=r;
  }
  rMax=Math.max(rMax*1.1,1);
  const sx=f=>x0+(f-fMin)/(fMax-fMin)*(x1-x0);
  const sy=r=>y1-Math.min(r,rMax)/rMax*(y1-y0);
  cx.strokeStyle='#1a2426';cx.lineWidth=1;cx.font='10px ui-monospace,monospace';
  cx.fillStyle='#566460';cx.textAlign='right';cx.textBaseline='middle';
  for(let i=0;i<=4;i++){const r=rMax*i/4,y=sy(r);cx.beginPath();cx.moveTo(x0,y);cx.lineTo(x1,y);cx.stroke();
    cx.fillText(r.toFixed(r>=10?0:1),x0-6,y);}
  cx.textAlign='center';cx.textBaseline='top';
  for(let g=1;g<=8;g++){const f=g*1000;const x=sx(f);
    cx.strokeStyle='#162022';cx.beginPath();cx.moveTo(x,y0);cx.lineTo(x,y1);cx.stroke();
    cx.fillStyle='#566460';cx.fillText(g+'G',x,y1+5);}
  const bands=[[1000,2000],[2800,4200],[4800,6000],[6000,8200]];
  cx.fillStyle='rgba(61,219,154,0.04)';bands.forEach(b=>cx.fillRect(sx(b[0]),y0,sx(b[1])-sx(b[0]),y1-y0));
  const xc=sx(curF);cx.strokeStyle='#f5b945';cx.lineWidth=1.2;cx.setLineDash([4,3]);
  cx.beginPath();cx.moveTo(xc,y0);cx.lineTo(xc,y1);cx.stroke();cx.setLineDash([]);
  cx.strokeStyle='#3ddb9a';cx.lineWidth=2;cx.beginPath();
  pts.forEach((p,i)=>{const x=sx(p[0]),y=sy(p[1]);i?cx.lineTo(x,y):cx.moveTo(x,y);});cx.stroke();
  cx.lineTo(sx(pts[pts.length-1][0]),y1);cx.lineTo(sx(pts[0][0]),y1);cx.closePath();
  cx.fillStyle='rgba(61,219,154,0.08)';cx.fill();
  const cdb=useCable?cableDbPerM(st.cable,curF)*len:0;
  const nfc=nfSys(useLna,useLna?st.lna:'none',cdb,nfRx,curF);
  const rc=rangeKm(pw,gRx,txAnt,nfc,curF,10,bw);
  cx.fillStyle='#f5b945';cx.beginPath();cx.arc(xc,sy(rc),4,0,7);cx.fill();
}
// ---------- COVERAGE WIDTH CALCULATOR ----------
function covCalc(){
  const ang=+$('covAngle').value, d=+$('covDist').value;
  const w=2*d*Math.tan(ang*Math.PI/360); // angle/2 in radians
  $('covWidth').textContent = (isFinite(w)&&w>0) ? (w>=10?w.toFixed(1):w.toFixed(2)) : '—';
  $('covSub').textContent = (isFinite(w)&&w>0) ? `≈ ${Math.round(w*1000).toLocaleString()} ${T[lang].cov_m}` : '';
  drawCov(ang,d,w);
}
function drawCov(ang,d,w){
  const svg=$('covSvg'); if(!svg) return;
  const half=Math.max(ang,1)*Math.PI/360;
  const ax=40, apexY=124, maxX=30, maxY=92;
  const Lc=Math.min(maxX/Math.sin(half), maxY/Math.cos(half));
  const topY=apexY-Lc*Math.cos(half);
  const lx=ax-Lc*Math.sin(half), rx=ax+Lc*Math.sin(half);
  const wTxt=(isFinite(w)&&w>0)?(w>=10?w.toFixed(1):w.toFixed(2)):'—';
  svg.innerHTML=
    `<line x1="${ax}" y1="${apexY}" x2="${ax}" y2="${topY.toFixed(1)}" stroke="#566460" stroke-width="1" stroke-dasharray="3 2"/>`+
    `<path d="M${ax} ${apexY} L${lx.toFixed(1)} ${topY.toFixed(1)} L${rx.toFixed(1)} ${topY.toFixed(1)} Z" fill="rgba(61,219,154,0.12)" stroke="#3ddb9a" stroke-width="1.5"/>`+
    `<line x1="${lx.toFixed(1)}" y1="${topY.toFixed(1)}" x2="${rx.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="#f5b945" stroke-width="2"/>`+
    `<circle cx="${ax}" cy="${apexY}" r="2.5" fill="#3ddb9a"/>`+
    `<text x="${ax}" y="${(topY-5).toFixed(1)}" fill="#f5b945" font-size="11" text-anchor="middle" font-family="monospace">${wTxt}</text>`;
}
document.querySelectorAll('#covPresets button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#covPresets button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');$('covAngle').value=b.dataset.a;covCalc();});
$('covAngle').addEventListener('input',()=>{
  document.querySelectorAll('#covPresets button').forEach(x=>x.classList.toggle('on',x.dataset.a===$('covAngle').value));
  covCalc();});
$('covDist').addEventListener('input',covCalc);

$('sens').value=senseFromNf().toFixed(1);updSensDisplay();
applyLang();
covCalc();
window.addEventListener('resize',calc);
</script>
</body>
</html>
